# Opacity + effects params — mirrors Figma's BlendMixin
# Include via $mixin: blend_params

blend_params:
  opacity: { type: token, optional: true, description: "Opacity (0-1) or variable name" }
  visible: { type: boolean, coerce: true, optional: true, description: "Show/hide (default true)" }
  locked: { type: boolean, coerce: true, optional: true, description: "Lock/unlock (default false)" }
  blendMode: { type: enum, values: [PASS_THROUGH, NORMAL, DARKEN, MULTIPLY, LINEAR_BURN, COLOR_BURN, LIGHTEN, SCREEN, LINEAR_DODGE, COLOR_DODGE, OVERLAY, SOFT_LIGHT, HARD_LIGHT, DIFFERENCE, EXCLUSION, HUE, SATURATION, COLOR, LUMINOSITY], optional: true }
  effectStyleName: { type: string, optional: true, description: "Effect style name (e.g. 'Shadow/Card') for shadows, blurs" }
