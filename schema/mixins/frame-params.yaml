# Aggregate frame-like params — reused by frame, auto_layout, component, variant_set create types.
# Include via $mixin: frame_params in any type's params block.
# Explicit params in the type override mixin params with the same name.
#
# Sub-mixins available for granular composition (e.g. PatchItem, instances):
#   geometry_params    — fill, stroke, corner (geometry.yaml)
#   blend_params       — opacity, effects (blend.yaml)
#   auto_layout_params — layout direction, padding, spacing (auto-layout.yaml)
#   sizing_params      — layoutSizing, min/max constraints (sizing.yaml)
#   text_params        — typography (text.yaml)

frame_params:
  name: { type: string, optional: true, description: "Node name" }
  parentId: { $ref: parentId }
  x: { $ref: xPos }
  y: { $ref: yPos }
  width: { type: number, coerce: true, optional: true, description: "Width (default: 100)" }
  height: { type: number, coerce: true, optional: true, description: "Height (default: 100)" }
  opacity: { type: token, optional: true, description: "Opacity (0-1) or variable name" }
  fillColor: { $ref: color, optional: true, description: "Fill color (auto-binds to matching variable/style)" }
  fillStyleName: { type: string, optional: true, description: "Paint style name for fill" }
  fillVariableName: { type: string, optional: true, description: "Color variable by name e.g. 'bg/primary'" }
  strokeColor: { $ref: color, optional: true, description: "Stroke color (auto-binds to matching variable/style)" }
  strokeStyleName: { type: string, optional: true, description: "Paint style name for stroke" }
  strokeVariableName: { type: string, optional: true, description: "Color variable by name for stroke" }
  strokeWeight: { type: token, optional: true, description: "Stroke weight (default: 1)" }
  cornerRadius: { $expand: corners, type: token }
  effectStyleName: { type: string, optional: true, description: "Effect style name (e.g. 'Shadow/Card') for shadows, blurs" }
  layoutMode: { type: enum, values: [NONE, HORIZONTAL, VERTICAL], optional: true, description: "Layout direction (default: NONE)" }
  layoutWrap: { type: enum, values: [NO_WRAP, WRAP], optional: true }
  padding: { $expand: padding, type: token }
  primaryAxisAlignItems: { type: enum, values: [MIN, MAX, CENTER, SPACE_BETWEEN], optional: true }
  counterAxisAlignItems: { type: enum, values: [MIN, MAX, CENTER, BASELINE], optional: true }
  layoutSizingHorizontal: { type: enum, values: [FIXED, HUG, FILL], optional: true }
  layoutSizingVertical: { type: enum, values: [FIXED, HUG, FILL], optional: true }
  itemSpacing: { type: token, optional: true, description: "Spacing between children (default: 0)" }
  counterAxisSpacing: { type: token, optional: true, description: "Gap between wrapped rows (requires layoutWrap: WRAP)" }
  minWidth: { type: number, coerce: true, optional: true, description: "Min width for responsive auto-layout" }
  maxWidth: { type: number, coerce: true, optional: true, description: "Max width for responsive auto-layout" }
  minHeight: { type: number, coerce: true, optional: true, description: "Min height for responsive auto-layout" }
  maxHeight: { type: number, coerce: true, optional: true, description: "Max height for responsive auto-layout" }
