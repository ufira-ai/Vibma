# Shared schema fragments — referenced via $ref: <name>

nodeId:
  type: string
  description: Node ID

parentId:
  type: string
  optional: true
  description: "Parent node ID. Omit to place at current page root."

depth:
  type: number
  coerce: true
  optional: true
  description: "Response detail: omit for id+name only. 0=properties + child stubs. N=recurse N levels. -1=unlimited."

xPos:
  type: number
  coerce: true
  optional: true
  description: "X position (default: 0)"

yPos:
  type: number
  coerce: true
  optional: true
  description: "Y position (default: 0)"

color:
  type: object
  coerce: hex_or_rgba
  description: 'Hex "#FF0000" or {r,g,b,a?} with values 0-1.'
  properties:
    r: { type: number, min: 0, max: 1 }
    g: { type: number, min: 0, max: 1 }
    b: { type: number, min: 0, max: 1 }
    a: { type: number, min: 0, max: 1, optional: true }

effectEntry:
  type: object
  properties:
    type: { type: enum, values: [DROP_SHADOW, INNER_SHADOW, LAYER_BLUR, BACKGROUND_BLUR] }
    color: { $ref: color, optional: true }
    offset: { type: object, optional: true, properties: { x: { type: number }, y: { type: number } } }
    radius: { type: number }
    spread: { type: number, optional: true }
    visible: { type: boolean, coerce: true, optional: true }
    blendMode: { type: string, optional: true }

inlineChildren:
  type: array
  coerce: json
  optional: true
  description: >
    Inline child nodes — build nested trees in one call. Types:
    text: {type:"text", text, fontFamily?, fontSize?, fontWeight?, fontStyle?, fontColor?, layoutSizingHorizontal?}.
    frame: {type:"frame", name?, layoutMode?, fillColor?, width?, layoutSizingHorizontal?, children?}.
    instance: {type:"instance", componentId, variantProperties?, properties?}.
    component: {type:"component", name, children?}.
    All params from text/frame endpoints are supported on their respective types.
    Always set layoutSizingHorizontal + layoutSizingVertical on children inside auto-layout parents (FILL, HUG, or FIXED).
    Example: children:[{type:"text", text:"Title", fontSize:20, layoutSizingHorizontal:"FILL", layoutSizingVertical:"HUG"},
    {type:"frame", name:"Row", layoutMode:"HORIZONTAL", layoutSizingHorizontal:"FILL", layoutSizingVertical:"HUG", itemSpacing:8,
    children:[{type:"instance", componentId:"1:2", layoutSizingHorizontal:"FILL", layoutSizingVertical:"HUG"}]}]
    Inside components: add componentPropertyName to auto-bind TEXT or INSTANCE_SWAP properties.
  items:
    type: object

inlineChildrenComponent:
  type: array
  coerce: json
  optional: true
  description: >
    Inline child nodes — build nested trees in one call. Types:
    text: {type:"text", text, componentPropertyName?, fontFamily?, fontSize?, fontWeight?, fontStyle?, fontColor?, layoutSizingHorizontal?}.
    frame: {type:"frame", name?, layoutMode?, fillColor?, width?, layoutSizingHorizontal?, children?}.
    instance: {type:"instance", componentId, componentPropertyName?, variantProperties?, properties?}.
    component: {type:"component", name, children?}.
    All params from text/frame endpoints are supported on their respective types.
    componentPropertyName auto-creates and binds a TEXT (text) or INSTANCE_SWAP (instance) property.
    Always set layoutSizingHorizontal + layoutSizingVertical on children inside auto-layout parents (FILL, HUG, or FIXED).
    Example: children:[{type:"text", text:"Label", componentPropertyName:"Label", fontSize:14,
    fontColorVariableName:"text/primary", layoutSizingHorizontal:"FILL", layoutSizingVertical:"HUG"},
    {type:"frame", name:"Actions", layoutMode:"HORIZONTAL", layoutSizingHorizontal:"FILL", layoutSizingVertical:"HUG", itemSpacing:8,
    children:[{type:"instance", componentId:"1:2", componentPropertyName:"Action", layoutSizingHorizontal:"FILL", layoutSizingVertical:"HUG"}]}]
  items:
    type: object

inlineVariants:
  type: array
  coerce: json
  optional: true
  description: 'Inline variant components. Each must be {type:"component", name, children?, ...frame_params}. All variants must share the same child structure. Alternative to componentIds — do not combine both.'
  items:
    type: object

fields:
  type: string[]
  coerce: json
  optional: true
  description: 'Property whitelist. Identity fields (id, name, type) always included. Omit for stubs on list, full on get. Pass ["*"] for all.'

offset:
  type: number
  coerce: true
  optional: true
  default: 0
  description: "Skip N items for pagination (default 0)"

limit:
  type: number
  coerce: true
  optional: true
  default: 100
  description: "Max items per page (default 100)"
