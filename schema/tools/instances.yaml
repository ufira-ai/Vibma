endpoint: instances
extends: node
domain: design-system
description: "Create and manage component instances."
description_zh: "创建和管理组件实例。"

notes: |
  // Instances are linked copies of components. Changes to the component propagate to all instances.
  // Overrides: instance-level changes (text, fills, visibility) that differ from the component. Shown in overrides array.
  // variantProperties: when creating from a component set, pick which variant e.g. {"Style":"Secondary","Size":"Large"}.
  // ---
  // Property keys: read returns clean names ("Label"), write requires the #suffix ("Label#1:0"). Call instances.get(id) to discover exact keys before update.
  // swap: change which component an instance points to while preserving compatible overrides.
  // detach: permanently converts an instance to a regular frame, breaking the component link.
  // reset_overrides: reverts all instance overrides to match the main component.
  // Workflow (local components): components.list → instances.create with componentId + properties (one call).
  // Workflow (external/published libraries): library(method:"components", query:"...") → instances.create with componentName + properties. The MCP resolves componentName → key and imports via figma.importComponentByKeyAsync — the raw key never enters agent context.
  // Instances support frame-level overrides: layoutSizingHorizontal/Vertical (FIXED, FILL, HUG), opacity, width/height, min/max.
  // Use layoutSizingHorizontal: "FILL" to make instances stretch in auto-layout parents.

methods:
  get:
    tier: read
    description: Get instance detail with component properties and overrides
    params:
      id:
        type: string
        required: true
        description: "Instance node ID"
      fields:
        $ref: fields
      depth:
        $ref: depth
      verbose:
        type: boolean
        optional: true
        description: "Include all properties (bounding box, constraints, text style details). Default false — returns slim, actionable output."
    response:
      type: object
      properties:
        results: { type: array, description: "Serialized node(s) with componentProperties, overrides" }
        _truncated: { type: boolean }
      required: [results]

  create:
    tier: create
    description: Create component instances
    example: 'instances(method:"create", items:[{componentName:"Button", variantProperties:{"Size":"Large"}, properties:{"Label":"Click me"}, parentId:"2:45", layoutSizingHorizontal:"FILL"}])  // or componentId:"1:23" for a local component'
    params:
      items:
        type: array
        coerce: json
        required: true
        tsType: "InstanceCreateItem[]"
        description: "Array of {componentId, variantProperties?, x?, y?, parentId?, layoutSizingHorizontal?, ...}"
        items:
          type: object
          properties:
            $mixin: [scene_params, blend_params, sizing_params]
            componentId: { type: string, optional: true, description: "Local component or component set ID. Pass this OR componentKey.", aliases: [id] }
            componentKey: { type: string, optional: true, description: "Published library component key — imports from a team library via importComponentByKeyAsync. Discover keys via library(method:\"components\", ...); the library tool auto-resolves names → keys so you normally pass componentName instead." }
            componentName: { type: string, optional: true, description: "Name of a component previously discovered via the library tool. Resolved to a componentKey MCP-side — the agent never handles the raw key. Preferred over componentKey for context hygiene." }
            sizing: { type: enum, values: [contextual], optional: true, description: "\"contextual\": infer FILL/HUG from parent layout (e.g. FILL horizontally in a VERTICAL auto-layout parent). Omit to inherit sizing from the component definition." }
            variantProperties: { type: object, coerce: json, optional: true, description: 'Pick variant e.g. {"Style":"Secondary"}' }
            properties: { type: object, coerce: json, optional: true, description: 'Set component properties inline e.g. {"Label":"Click me", "ShowIcon":true}. Same as instances.update properties.' }
            name: { type: string, optional: true, description: "Instance layer name" }
            x: { type: number, coerce: true, optional: true }
            y: { type: number, coerce: true, optional: true }
            width: { type: number, coerce: true, optional: true, description: "Override width (resize)" }
            height: { type: number, coerce: true, optional: true, description: "Override height (resize)" }
            explicitMode: { type: object, coerce: json, optional: true, description: "Pin variable mode at creation — use { collectionName, modeName } (preferred) or { collectionId, modeId }. Useful for library components with Light/Dark modes." }
            parentId: { $ref: parentId }
      depth: { $ref: depth }
    response:
      type: batch
      item: { id: { type: string } }

  update:
    tier: edit
    description: Set instance properties
    example: 'instances(method:"update", items:[{id:"1:23", properties:{"Label#4:0":"Submit"}, fillColor:"#3B82F6", layoutSizingHorizontal:"FILL"}])'
    params:
      items:
        type: array
        coerce: json
        required: true
        tsType: "InstanceUpdateItem[]"
        description: 'Array of {id, properties: {"Label#1:0":"text"}, fillColor?: ...}'
        items:
          type: object
          properties:
            $mixin: [geometry_params, scene_params, blend_params, auto_layout_params, sizing_params, text_params]
            id: { type: string, required: true, description: "Instance node ID" }
            properties: { type: object, coerce: json, optional: true, description: "Component property key→value map" }
            componentProperties: { type: object, coerce: json, optional: true, description: "Alias for properties (matches instances.get response shape)" }
            # --- visual overrides (same as node.update PatchItem) ---
            name: { type: string, optional: true, description: "Rename node" }
            visible: { type: boolean, optional: true, description: "Show/hide (default true)" }
            locked: { type: boolean, optional: true, description: "Lock/unlock (default false)" }
            rotation: { type: number, optional: true, description: "Degrees (0-360)" }
            blendMode: { type: enum, values: [PASS_THROUGH, NORMAL, DARKEN, MULTIPLY, LINEAR_BURN, COLOR_BURN, LIGHTEN, SCREEN, LINEAR_DODGE, COLOR_DODGE, OVERLAY, SOFT_LIGHT, HARD_LIGHT, DIFFERENCE, EXCLUSION, HUE, SATURATION, COLOR, LUMINOSITY], optional: true }
            layoutPositioning: { type: enum, values: [AUTO, ABSOLUTE], optional: true, description: "ABSOLUTE = floating inside auto-layout parent" }
            x: { type: number, optional: true }
            y: { type: number, optional: true }
            width: { type: number, optional: true }
            height: { type: number, optional: true }
            clearFill: { type: boolean, optional: true, description: "Remove all fills" }
            # strokeWeight expanded via geometry_params mixin ($expand: stroke)
            effects: { type: array, optional: true, description: "Effect array (DROP_SHADOW, INNER_SHADOW, LAYER_BLUR, BACKGROUND_BLUR)", items: { type: object } }
            constraints: { type: object, optional: true, properties: { horizontal: { type: enum, values: [MIN, CENTER, MAX, STRETCH, SCALE] }, vertical: { type: enum, values: [MIN, CENTER, MAX, STRETCH, SCALE] } } }
            bindings: { type: array, optional: true, description: "Bind variables to properties. field path examples: 'fills/0/color', 'strokes/0/color', 'opacity', 'width', 'cornerRadius', 'itemSpacing'.", items: { type: object, properties: { field: { type: string, required: true }, variableName: { type: string }, variableId: { type: string } } } }
            explicitMode: { type: object, optional: true, description: "Pin variable mode — use { collectionName, modeName } (preferred) or { collectionId, modeId }" }
            exportSettings: { type: array, optional: true, description: "Export settings", items: { type: object } }
    response:
      type: batch_mixed

  swap:
    tier: edit
    description: "Swap instance component (preserves overrides)"
    params:
      items:
        type: array
        coerce: json
        required: true
        description: "Array of {id, componentId}"
        items:
          type: object
          properties:
            id: { type: string, required: true, description: "Instance node ID" }
            componentId: { type: string, required: true, description: "New component or component set ID" }
    response:
      type: batch_mixed

  detach:
    tier: edit
    description: "Detach instances from their component (converts to frame)"
    params:
      items:
        type: array
        coerce: json
        required: true
        description: "Array of {id}"
        items:
          type: object
          properties:
            id: { type: string, required: true, description: "Instance node ID" }
    response:
      type: batch
      item: { id: { type: string } }

  reset_overrides:
    tier: edit
    description: "Reset all overrides on instances to match their main component"
    params:
      items:
        type: array
        coerce: json
        required: true
        description: "Array of {id}"
        items:
          type: object
          properties:
            id: { type: string, required: true, description: "Instance node ID" }
    response:
      type: batch_mixed
