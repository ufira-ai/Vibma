endpoint: document
domain: document
description: "Navigate and manage Figma pages (canvases) in the document."
description_zh: "导航和管理 Figma 文档中的页面（画布）。"

notes: |
  // A Figma document contains pages — each page is an independent canvas with its own node tree.
  // The "current page" is where all node operations happen. Use document.set to switch pages before working with nodes.
  // Page IDs look like "0:1", "1:1", etc. The first page is always "0:1".
  // get returns the current page with its top-level children as stubs. list returns all pages in the document.

methods:
  get:
    tier: read
    description: Get current page with top-level children
    params: {}
    response:
      type: object
      properties:
        id: { type: string, required: true }
        name: { type: string, required: true }
        backgroundColor: { type: string, description: 'Canvas background hex color (e.g. "#F5F5F5")' }
        children: { type: array, tsType: "NodeStub[]" }
      required: [id, name, children]

  list:
    tier: read
    description: Get document name and list all pages
    params: {}
    response:
      type: object
      properties:
        name: { type: string, required: true, description: Document name }
        currentPageId: { type: string, required: true }
        pages: { type: array, items: { type: object, properties: { id: { type: string, required: true }, name: { type: string, required: true } } } }
      required: [name, currentPageId, pages]

  set:
    tier: read
    description: Switch to a page by ID or name
    params:
      pageId:
        type: string
        optional: true
        description: Page ID
      pageName:
        type: string
        optional: true
        description: Page name (case-insensitive, substring match)
    response:
      type: object
      properties:
        id: { type: string, required: true }
        name: { type: string, required: true }
      required: [id, name]

  create:
    tier: create
    description: Create a new page
    params:
      name:
        type: string
        optional: true
        description: "Page name (default: 'New Page')"
    response:
      type: object
      properties:
        id: { type: string, required: true, description: New page ID }
      required: [id]

  update:
    tier: edit
    description: Rename a page
    params:
      newName:
        type: string
        required: true
        description: New page name
      pageId:
        type: string
        optional: true
        description: "Page ID (default: current page)"
    response:
      type: string
