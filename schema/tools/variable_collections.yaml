endpoint: variable_collections
domain: design-system
description: "CRUD for variable collections and mode management."
description_zh: "管理变量集合和模式。"

notes: |
  // Variable collections group related design tokens (variables) and define their modes.
  // Modes represent different contexts (e.g. Light/Dark theme, Desktop/Mobile breakpoint). Each collection has 1+ modes.
  // ---
  // Workflow: create collection → add_mode for extra modes → create variables in the collection.
  // Deleting a collection cascades — all variables inside it are also deleted.
  // The default mode always exists and cannot be removed. Use add_mode/remove_mode for additional modes.
  // All ID params (id, collectionId, modeId) accept both IDs and display names. Use whichever you have.

methods:
  list:
    tier: read
    description: List variable collections
    params:
      fields:
        $ref: fields
      offset:
        $ref: offset
      limit:
        $ref: limit
    response:
      type: paginated
      item:
        type: object
        properties:
          id: { type: string, required: true }
          name: { type: string, required: true }

  get:
    tier: read
    description: Get collection detail
    params:
      id:
        type: string
        required: true
        description: "Collection ID or name"
      fields:
        $ref: fields
    response:
      type: object
      tsType: Collection
      properties:
        id: { type: string, required: true }
        name: { type: string, required: true }
        modes:
          type: array
          required: true
          items:
            type: object
            properties:
              modeId: { type: string, required: true }
              name: { type: string, required: true }
        defaultModeId: { type: string, required: true }
        variableNames: { type: "string[]", required: true }

  create:
    tier: create
    description: Create variable collections
    params:
      items:
        type: array
        coerce: json
        required: true
        description: "Array of {name}"
        items:
          type: object
          properties:
            name: { type: string, required: true, description: "Collection name" }
    response:
      type: batch
      item: { id: { type: string } }

  update:
    tier: edit
    description: Rename collections
    params:
      items:
        type: array
        coerce: json
        required: true
        description: "Array of {id, name}"
        items:
          type: object
          properties:
            id: { type: string, required: true, description: "Collection ID or name" }
            name: { type: string, required: true, description: "New name" }
    response:
      type: batch_mixed

  delete:
    tier: edit
    description: Delete collections
    params:
      id:
        type: string
        optional: true
        description: "Collection ID or name"
      items:
        type: array
        coerce: json
        optional: true
        description: "Batch: [{id}, ...]"
        items:
          type: object
          properties:
            id: { type: string, required: true }
    response:
      type: batch_ok

  add_mode:
    tier: create
    description: Add a mode to a collection
    params:
      items:
        type: array
        coerce: json
        required: true
        description: "Array of {collectionId, name}"
        items:
          type: object
          properties:
            collectionId: { type: string, required: true, description: "Collection ID or name" }
            name: { type: string, required: true, description: "Mode name" }
    response:
      type: batch
      item: { modeId: { type: string } }

  rename_mode:
    tier: edit
    description: Rename a mode
    params:
      items:
        type: array
        coerce: json
        required: true
        description: "Array of {collectionId, modeId, name}"
        items:
          type: object
          properties:
            collectionId: { type: string, required: true, description: "Collection ID or name" }
            modeId: { type: string, required: true, description: "Mode ID or name (e.g. \"Dark\")" }
            name: { type: string, required: true, description: "New name" }
    response:
      type: batch_mixed

  remove_mode:
    tier: edit
    description: Remove a mode from a collection
    params:
      items:
        type: array
        coerce: json
        required: true
        description: "Array of {collectionId, modeId}"
        items:
          type: object
          properties:
            collectionId: { type: string, required: true, description: "Collection ID or name" }
            modeId: { type: string, required: true, description: "Mode ID or name (e.g. \"Dark\")" }
    response:
      type: batch_ok
