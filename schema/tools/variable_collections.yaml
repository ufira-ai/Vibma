endpoint: variable_collections
domain: design-system
description: "CRUD for variable collections — the document-level API for design tokens."
description_zh: "管理变量集合——设计令牌的文档级 API。"

notes: |
  // Variable collections group design tokens and define their modes (e.g. Light/Dark, Desktop/Mobile).
  // All ID params accept both IDs and display names.
  // ---
  // valuesByMode: values keyed by mode name, e.g. {"Light": "#FFF", "Dark": "#111"}.
  // Aliases: {type: "VARIABLE_ALIAS", name: "other/variable"}.
  // scopes: see variables endpoint for full list.
  // Deleting a collection deletes all variables inside it.
  // The default mode cannot be removed. Use add_mode/remove_mode for additional modes.

methods:
  list:
    tier: read
    description: List variable collections
    params:
      fields:
        $ref: fields
      offset:
        $ref: offset
      limit:
        $ref: limit
    response:
      type: paginated
      item:
        type: object
        properties:
          id: { type: string, required: true }
          name: { type: string, required: true }
          modes: { type: "string[]", optional: true, description: "Mode names" }
          variableCount: { type: number, optional: true, description: "Number of variables" }

  get:
    tier: read
    description: Get collection with all variables and values (full document)
    params:
      id:
        type: string
        required: true
        description: "Collection ID or name"
      fields:
        $ref: fields
    response:
      type: object
      tsType: Collection
      properties:
        id: { type: string, required: true }
        name: { type: string, required: true }
        modes: { type: "string[]", required: true, description: "Mode names (e.g. ['Light', 'Dark'])" }
        variables:
          type: array
          required: true
          description: "All variables in this collection"
          items:
            type: object
            properties:
              name: { type: string, required: true }
              type: { type: string, required: true, description: "COLOR | FLOAT | STRING | BOOLEAN" }
              valuesByMode:
                type: object
                required: true
                description: "Values keyed by mode name"
              scopes: { type: "string[]", optional: true }
              description: { type: string, optional: true }

  create:
    tier: create
    description: "Create a collection with modes and variables in one call"
    example: 'variable_collections(method:"create", items:[{name:"Colors", modes:["Light","Dark"], variables:[{name:"bg/primary", type:"COLOR", valuesByMode:{"Light":"#FFF","Dark":"#111"}, scopes:["ALL_FILLS"]}]}])'
    params:
      items:
        type: array
        coerce: json
        required: true
        description: "Array of collection documents"
        items:
          type: object
          properties:
            name: { type: string, required: true, description: "Collection name" }
            modes:
              type: "string[]"
              coerce: json
              optional: true
              description: "Mode names (e.g. ['Light', 'Dark']). Omit for single-mode collection."
            variables:
              type: array
              coerce: json
              optional: true
              description: "Variables to create inside this collection"
              items:
                type: object
                properties:
                  name: { type: string, required: true, description: "Variable name (unique within collection)" }
                  type: { type: enum, values: [COLOR, FLOAT, STRING, BOOLEAN], required: true, description: "Variable type" }
                  value: { type: variable_value, optional: true, description: "Shorthand — sets the default mode value. Use valuesByMode for multi-mode." }
                  valuesByMode:
                    type: object
                    coerce: json
                    optional: true
                    description: 'Values keyed by mode name (e.g. {"Light": "#FFF", "Dark": "#111"})'
                  description: { type: string, optional: true }
                  scopes: { type: "string[]", coerce: json, optional: true, description: "Restrict where variable can be applied (default: ALL_SCOPES)" }
    response:
      type: batch
      item: { id: { type: string } }

  update:
    tier: edit
    description: Rename collections
    params:
      items:
        type: array
        coerce: json
        required: true
        description: "Array of {id, name}"
        items:
          type: object
          properties:
            id: { type: string, required: true, description: "Collection ID or name" }
            name: { type: string, required: true, description: "New name" }
    response:
      type: batch_mixed

  delete:
    tier: edit
    description: Delete collections
    params:
      id:
        type: string
        optional: true
        description: "Collection ID or name"
      items:
        type: array
        coerce: json
        optional: true
        description: "Batch: [{id}, ...]"
        items:
          type: object
          properties:
            id: { type: string, required: true }
    response:
      type: batch_ok

  add_mode:
    tier: create
    description: Add a mode to a collection
    params:
      items:
        type: array
        coerce: json
        required: true
        description: "Array of {collectionId, name}"
        items:
          type: object
          properties:
            collectionId: { type: string, required: true, description: "Collection ID or name" }
            name: { type: string, required: true, description: "Mode name" }
    response:
      type: batch
      item: { modeId: { type: string } }

  rename_mode:
    tier: edit
    description: Rename a mode
    params:
      items:
        type: array
        coerce: json
        required: true
        description: "Array of {collectionId, modeId, name}"
        items:
          type: object
          properties:
            collectionId: { type: string, required: true, description: "Collection ID or name" }
            modeId: { type: string, required: true, description: "Mode ID or name (e.g. \"Dark\")" }
            name: { type: string, required: true, description: "New name" }
    response:
      type: batch_mixed

  remove_mode:
    tier: edit
    description: Remove a mode from a collection
    params:
      items:
        type: array
        coerce: json
        required: true
        description: "Array of {collectionId, modeId}"
        items:
          type: object
          properties:
            collectionId: { type: string, required: true, description: "Collection ID or name" }
            modeId: { type: string, required: true, description: "Mode ID or name (e.g. \"Dark\")" }
    response:
      type: batch_ok
