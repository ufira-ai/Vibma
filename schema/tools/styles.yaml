endpoint: styles
domain: design-system
description: "CRUD for local paint, text, effect, and grid styles."
description_zh: "管理本地颜色、文字、效果和网格样式。"

notes: |
  // Styles are named, reusable design properties that can be applied to nodes. Four types:
  //   paint: a named color (applied to fills/strokes), text: typography settings, effect: shadows/blurs, grid: layout grids.
  // All ID params accept both IDs and display names (case-insensitive). Use whichever you have.
  // ---
  // leadingTrim: "CAP_HEIGHT" trims line-height to cap height (tighter text boxes), "NONE" is default.
  // fontStyle: font variant name like "Bold", "Italic", "Bold Italic". Use fonts.list to find available styles.
  //
  // Effect object shape (for effect styles):
  //   { type: "DROP_SHADOW"|"INNER_SHADOW"|"LAYER_BLUR"|"BACKGROUND_BLUR",
  //     color?: Color, offset?: {x, y}, radius: number, spread?: number,
  //     visible?: boolean, blendMode?: string }
  //   DROP_SHADOW/INNER_SHADOW require color, offset, radius. LAYER_BLUR/BACKGROUND_BLUR require radius only.
  //   Example: { type: "DROP_SHADOW", color: "#00000040", offset: {x:0,y:4}, radius: 8 }
  //
  // LayoutGrid object shape (for grid styles):
  //   Rows/Columns: { pattern: "ROWS"|"COLUMNS", alignment: "MIN"|"MAX"|"STRETCH"|"CENTER",
  //     gutterSize: number, count: number, sectionSize?: number, offset?: number, visible?: boolean, color?: Color }
  //   Grid: { pattern: "GRID", sectionSize: number, visible?: boolean, color?: Color }
  //   Example: { pattern: "COLUMNS", alignment: "STRETCH", gutterSize: 20, count: 12, offset: 40 }

methods:
  list:
    tier: read
    description: List local styles with optional type filter
    params:
      type:
        type: enum
        values: [paint, text, effect, grid]
        optional: true
        description: "Filter by style type"
      fields:
        $ref: fields
      offset:
        $ref: offset
      limit:
        $ref: limit
    response:
      type: paginated
      item:
        type: object
        properties:
          id: { type: string, required: true }
          name: { type: string, required: true }
          type: { type: string, required: true }

  get:
    tier: read
    description: Get full style detail by ID
    params:
      id:
        type: string
        required: true
        description: "Style ID or name"
      fields:
        $ref: fields
    response:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string }

  create:
    tier: create
    description: Create local styles
    example: 'styles(method:"create", type:"effect", name:"Shadow/Medium", effects:[{type:"DROP_SHADOW", color:"#00000040", offset:{x:0,y:4}, radius:8}])'
    discriminant: type
    types:
      paint:
        description: Paint/color style
        params:
          name: { type: string, required: true, description: Style name }
          color: { $ref: color, required: true, description: Color value }
          colorVariableName: { type: string, optional: true, description: "Bind to a COLOR variable by name (style tracks the variable)" }
          description: { type: string, optional: true, description: "Style description" }
      text:
        description: Text style
        params:
          name: { type: string, required: true, description: Style name }
          fontFamily: { type: string, required: true, description: Font family }
          fontStyle: { type: string, optional: true, description: "Font style (default: Regular)" }
          fontSize: { type: number, coerce: true, required: true, description: Font size }
          lineHeight: { type: line_height, optional: true }
          letterSpacing: { type: letter_spacing, optional: true }
          textCase: { type: enum, values: [ORIGINAL, UPPER, LOWER, TITLE, SMALL_CAPS, SMALL_CAPS_FORCED], optional: true }
          textDecoration: { type: enum, values: [NONE, UNDERLINE, STRIKETHROUGH], optional: true }
          paragraphIndent: { type: number, coerce: true, optional: true, description: "Paragraph indent (px)" }
          paragraphSpacing: { type: number, coerce: true, optional: true, description: "Paragraph spacing (px)" }
          leadingTrim: { type: enum, values: [CAP_HEIGHT, NONE], optional: true, description: "Leading trim mode" }
          description: { type: string, optional: true, description: "Style description" }
      effect:
        description: Effect style
        params:
          name: { type: string, required: true, description: Style name }
          effects: { type: array, coerce: json, required: true, description: "Array of Effect objects" }
          description: { type: string, optional: true, description: "Style description" }
      grid:
        description: Grid/layout grid style
        params:
          name: { type: string, required: true, description: Style name }
          layoutGrids: { type: array, coerce: json, required: true, description: "Array of LayoutGrid objects" }
          description: { type: string, optional: true, description: "Style description" }
    response:
      type: batch
      item: { id: { type: string } }

  update:
    tier: edit
    description: Update styles by ID or name
    params:
      type:
        type: enum
        values: [paint, text, effect, grid]
        optional: true
        description: "Style type hint for strict validation (optional, auto-detected)"
      items:
        type: array
        coerce: json
        required: true
        tsType: "PatchStyleItem[]"
        description: "Array of {id, ...fields} to update"
        items:
          type: object
          properties:
            id: { type: string, required: true, description: "Style ID or name" }
            name: { type: string, optional: true, description: Rename the style }
            description: { type: string, optional: true, description: "Style description" }
            color: { $ref: color, optional: true, description: "New color (paint styles)" }
            colorVariableName: { type: string, optional: true, description: "Bind to a COLOR variable by name (paint styles)" }
            fontFamily: { type: string, optional: true }
            fontStyle: { type: string, optional: true }
            fontSize: { type: number, coerce: true, optional: true }
            lineHeight: { type: line_height, optional: true }
            letterSpacing: { type: letter_spacing, optional: true }
            textCase: { type: enum, values: [ORIGINAL, UPPER, LOWER, TITLE, SMALL_CAPS, SMALL_CAPS_FORCED], optional: true }
            textDecoration: { type: enum, values: [NONE, UNDERLINE, STRIKETHROUGH], optional: true }
            paragraphIndent: { type: number, coerce: true, optional: true, description: "Paragraph indent (px)" }
            paragraphSpacing: { type: number, coerce: true, optional: true, description: "Paragraph spacing (px)" }
            leadingTrim: { type: enum, values: [CAP_HEIGHT, NONE], optional: true }
            effects: { type: array, coerce: json, optional: true, description: "Array of Effect objects" }
            layoutGrids: { type: array, coerce: json, optional: true, description: "Array of LayoutGrid objects (grid styles)" }
      depth: { $ref: depth }
    response:
      type: batch_mixed

  delete:
    tier: edit
    description: Delete styles
    params:
      id:
        type: string
        optional: true
        description: "Style ID or name"
      items:
        type: array
        coerce: json
        optional: true
        description: "Batch: [{id}, ...]"
        items:
          type: object
          properties:
            id: { type: string, required: true, description: "Style ID or name" }
    response:
      type: batch_ok
