endpoint: variables
domain: design-system
description: "CRUD for design variables (COLOR, FLOAT, STRING, BOOLEAN)."
description_zh: "管理设计变量（颜色、数值、字符串、布尔）。"

notes: |
  // Variables are design tokens — reusable values (colors, numbers, strings, booleans) that can be bound to node properties.
  // Variables are identified by name (unique within a collection). Use name to get/update/delete.
  // All ID params (collectionId, modeId) accept both IDs and display names. Use whichever you have.
  // Workflow: create a variable_collection first → then create variables inside it → bind to nodes via frames/text update PatchItem.bindings.
  // list returns `items` (not `results`). get/create/update/delete use standard batch responses.
  // ---
  // Each variable has values per mode (e.g. Light/Dark). Use modeId when setting values for a specific mode.
  // valuesByMode keys are mode names (e.g. "Light", "Dark"), not IDs. Values match the variable's resolvedType.
  // Aliases: a variable can reference another variable by name via {type: "VARIABLE_ALIAS", name: "other/variable"}.
  // scopes: restrict where variables appear in the UI. Values: "ALL_SCOPES", "TEXT_CONTENT", "WIDTH_HEIGHT", "GAP",
  //   "CORNER_RADIUS", "ALL_FILLS", "FRAME_FILL", "SHAPE_FILL", "TEXT_FILL", "STROKE_COLOR", "STROKE_FLOAT",
  //   "EFFECT_FLOAT", "EFFECT_COLOR", "OPACITY", "FONT_FAMILY", "FONT_STYLE", "FONT_WEIGHT", "FONT_SIZE", "LINE_HEIGHT", "LETTER_SPACING", "PARAGRAPH_SPACING", "PARAGRAPH_INDENT"

methods:
  list:
    tier: read
    description: List variables with optional filters
    params:
      type:
        type: enum
        values: [COLOR, FLOAT, STRING, BOOLEAN]
        optional: true
        description: "Filter by variable type"
      collectionId:
        type: string
        optional: true
        description: "Filter by collection (ID or name)"
      fields:
        $ref: fields
      offset:
        $ref: offset
      limit:
        $ref: limit
    response:
      type: paginated
      item:
        type: object
        properties:
          name: { type: string, required: true }
          resolvedType: { type: string, optional: true, description: "Included in stubs by default" }
          collectionId: { type: string, optional: true, description: "Collection name. Included in stubs by default" }
          scopes: { type: "string[]", optional: true, description: "Variable scopes. Included in stubs by default" }

  get:
    tier: read
    description: Get variable detail by name
    params:
      name:
        type: string
        required: true
        description: "Variable name (unique within collection)"
      collectionId:
        type: string
        optional: true
        description: "Collection ID or name (required if same variable name exists in multiple collections)"
      fields:
        $ref: fields
    response:
      type: object
      tsType: Variable
      properties:
        name: { type: string, required: true }
        resolvedType:
          type: enum
          values: [COLOR, FLOAT, STRING, BOOLEAN]
          required: true
        collectionId: { type: string, required: true, description: "Collection display name" }
        valuesByMode:
          type: object
          required: true
          tsType: "Record<string, number | boolean | string | Color | {type: \"VARIABLE_ALIAS\", name: string}>"
          description: "Values keyed by mode name (e.g. \"Light\", \"Dark\")"
        description: { type: string, description: "Variable description" }
        scopes:
          type: "string[]"
          description: "Where this variable can be applied (e.g. CORNER_RADIUS, GAP, ALL_SCOPES)"
      required: [name, resolvedType, collectionId, valuesByMode]

  create:
    tier: create
    description: Create variables
    example: 'variables(method:"create", items:[{collectionId:"Colors", name:"bg/primary", resolvedType:"COLOR", value:"#1A1A2E"}])'
    params:
      items:
        type: array
        coerce: json
        required: true
        tsType: "VariableCreateItem[]"
        description: "Array of {collectionId, name, resolvedType, value?, modeId?, description?, scopes?}"
        items:
          type: object
          properties:
            collectionId: { type: string, required: true, description: "Collection ID or name (e.g. \"Colors\")" }
            name: { type: string, required: true, description: "Variable name" }
            resolvedType: { type: enum, values: [COLOR, FLOAT, STRING, BOOLEAN], required: true, description: "Variable type" }
            value: { type: variable_value, optional: true, description: "Initial value (uses default mode unless modeId specified)" }
            modeId: { type: string, optional: true, description: "Mode ID or name (e.g. \"Dark\"). Default: collection's default mode" }
            description: { type: string, optional: true, description: "Variable description" }
            scopes: { type: "string[]", coerce: json, optional: true, description: 'Restrict where variable can be applied. FLOAT: CORNER_RADIUS, GAP, STROKE_FLOAT, WIDTH_HEIGHT, OPACITY, EFFECT_FLOAT, FONT_SIZE, LINE_HEIGHT, LETTER_SPACING, PARAGRAPH_SPACING, PARAGRAPH_INDENT. COLOR: ALL_FILLS, FRAME_FILL, SHAPE_FILL, TEXT_FILL, STROKE_COLOR, EFFECT_COLOR. Default: ALL_SCOPES.' }
    response:
      type: batch
      item: { name: { type: string, description: "Name of the created variable" } }

  update:
    tier: edit
    description: "Update variable metadata and/or set values per mode"
    params:
      items:
        type: array
        coerce: json
        required: true
        tsType: "VariableUpdateItem[]"
        description: "Array of {name, collectionId?, rename?, description?, scopes?, modeId?, value?}"
        items:
          type: object
          properties:
            name: { type: string, required: true, description: "Variable name" }
            collectionId: { type: string, optional: true, description: "Collection ID or name (required if ambiguous)" }
            rename: { type: string, optional: true, description: "Rename the variable" }
            description: { type: string, optional: true, description: "Set description" }
            scopes: { type: "string[]", coerce: json, optional: true, description: 'Restrict where variable can be applied. FLOAT: CORNER_RADIUS, GAP, STROKE_FLOAT, WIDTH_HEIGHT, OPACITY. COLOR: ALL_FILLS, FRAME_FILL, SHAPE_FILL, TEXT_FILL, STROKE_COLOR. Default: ALL_SCOPES.' }
            modeId: { type: string, optional: true, description: "Mode ID or name (e.g. \"Dark\"). Required when setting value" }
            value: { type: variable_value, optional: true }
    response:
      type: batch_mixed

  delete:
    tier: edit
    description: Delete variables
    params:
      name:
        type: string
        optional: true
        description: Variable name
      collectionId:
        type: string
        optional: true
        description: "Collection ID or name (required if ambiguous)"
      items:
        type: array
        coerce: json
        optional: true
        description: "Batch: [{name, collectionId?}, ...]"
        items:
          type: object
          properties:
            name: { type: string, required: true }
            collectionId: { type: string, optional: true, description: "Collection ID or name" }
    response:
      type: batch_ok
