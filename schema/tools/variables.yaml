endpoint: variables
domain: design-system
description: "CRUD for design variables (COLOR, FLOAT, STRING, BOOLEAN)."
description_zh: "管理设计变量（颜色、数值、字符串、布尔）。"

notes: |
  interface Variable { id: string; name: string; resolvedType: "COLOR"|"FLOAT"|"STRING"|"BOOLEAN"; variableCollectionId: string; valuesByMode: Record<string, any> }
  // update: {id, name?, description?, scopes?, modeId?, value?}
  // value: number, boolean, Color ({r,g,b,a?} or hex), or alias {type:"VARIABLE_ALIAS", id:"VariableID:..."}
  // Use variable_collections to manage modes. Bind to nodes via frames/text update PatchItem.bindings.

methods:
  list:
    tier: read
    description: List variables with optional filters
    params:
      type:
        type: enum
        values: [COLOR, FLOAT, STRING, BOOLEAN]
        optional: true
        description: "Filter by variable type"
      collectionId:
        type: string
        optional: true
        description: "Filter by collection ID"
      fields:
        $ref: fields
      offset:
        $ref: offset
      limit:
        $ref: limit
    response:
      type: paginated
      item:
        type: object
        properties:
          id: { type: string, required: true }
          name: { type: string, required: true }
          resolvedType: { type: string, required: true }
          variableCollectionId: { type: string, required: true }

  get:
    tier: read
    description: Get variable detail
    params:
      id:
        type: string
        required: true
        description: "Variable ID (e.g. VariableID:1:6)"
      fields:
        $ref: fields
    response:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        resolvedType: { type: string }
        variableCollectionId: { type: string }
        valuesByMode: { type: object }

  create:
    tier: create
    description: Create variables
    params:
      items:
        type: array
        coerce: json
        required: true
        description: "Array of {collectionId, name, resolvedType}"
        items:
          type: object
          properties:
            collectionId: { type: string, required: true, description: "Variable collection ID" }
            name: { type: string, required: true, description: "Variable name" }
            resolvedType: { type: enum, values: [COLOR, FLOAT, STRING, BOOLEAN], required: true, description: "Variable type" }
    response:
      type: batch
      item: { id: { type: string } }

  update:
    tier: edit
    description: "Update variable metadata and/or set values per mode"
    params:
      items:
        type: array
        coerce: json
        required: true
        description: "Array of {id, name?, description?, scopes?, modeId?, value?}"
        items:
          type: object
          properties:
            id: { type: string, required: true, description: "Variable ID" }
            name: { type: string, optional: true, description: "Rename the variable" }
            description: { type: string, optional: true, description: "Set description" }
            scopes: { type: "string[]", coerce: json, optional: true, description: 'UI scopes e.g. ["ALL_SCOPES"] or ["WIDTH_HEIGHT","CORNER_RADIUS"]' }
            modeId: { type: string, optional: true, description: "Mode ID (required when setting value)" }
            value: { type: variable_value, optional: true }
    response:
      type: batch_mixed

  delete:
    tier: edit
    description: Delete variables
    params:
      id:
        type: string
        optional: true
        description: Single variable ID
      items:
        type: array
        coerce: json
        optional: true
        description: "Batch: [{id}, ...]"
        items:
          type: object
          properties:
            id: { type: string, required: true }
    response:
      type: batch_ok
