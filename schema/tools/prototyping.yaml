endpoint: prototyping
domain: interaction
description: "Manage prototype interactions, reactions, and navigation flows."
description_zh: "管理原型交互、反应和导航流程。"

notes: |
  // Reactions wire up interactions: trigger (ON_CLICK, ON_HOVER, ...) → action (navigate, swap, overlay).
  // Common patterns: button ON_CLICK → NAVIGATE to detail frame; card ON_HOVER → CHANGE_TO hover variant.
  // Multi-action: pass actions[] array to run multiple actions on one trigger (e.g. navigate + set variable mode).
  // ---
  // IMPORTANT: destination rules depend on navigation type:
  //   NAVIGATE/SWAP/OVERLAY/SCROLL_TO → destination must be a top-level frame (direct child of a page). Nested frames are rejected.
  //   CHANGE_TO → destination must be a variant (COMPONENT inside a COMPONENT_SET). Used for hover/state swaps within the same component.
  // ---
  // TRIGGERS: ON_CLICK | ON_HOVER | ON_PRESS | ON_DRAG | AFTER_TIMEOUT(timeout) | MOUSE_ENTER(delay) | MOUSE_LEAVE(delay) | ON_KEY_DOWN(keyCodes)
  // NAVIGATION: NAVIGATE (go to frame) | SWAP (swap overlay) | OVERLAY (show overlay) | SCROLL_TO | CHANGE_TO (swap component variant)
  // TRANSITIONS: DISSOLVE | SMART_ANIMATE | MOVE_IN | MOVE_OUT | PUSH | SLIDE_IN | SLIDE_OUT (+ direction for directional)
  // EASING: EASE_IN | EASE_OUT | EASE_IN_AND_OUT | LINEAR | GENTLE | QUICK | BOUNCY | SLOW
  // ACTIONS: NODE (navigate/swap) | BACK (go back) | CLOSE (close overlay) | URL (open link) | SET_VARIABLE_MODE (switch theme/mode)

methods:
  get:
    tier: read
    description: "Get reactions and overflow direction on a node"
    params:
      id:
        type: string
        required: true
        description: "Node ID"
    response:
      type: object
      properties:
        reactions: { type: array, description: "Reactions on this node" }
        overflowDirection: { type: string, description: "Overflow scroll direction (NONE, HORIZONTAL, VERTICAL, BOTH)" }

  add:
    tier: edit
    description: "Add a prototype reaction to a node"
    example: 'prototyping(method:"add", items:[{id:"btn-1", trigger:"ON_CLICK", destination:"frame-2", navigation:"NAVIGATE", transition:"SMART_ANIMATE"}, {id:"btn-2", trigger:"ON_CLICK", destination:"frame-3"}])'
    params:
      id: { type: string, optional: true, description: "Node ID" }
      trigger:
        type: enum
        values: [ON_CLICK, ON_HOVER, ON_PRESS, ON_DRAG, AFTER_TIMEOUT, MOUSE_ENTER, MOUSE_LEAVE, ON_KEY_DOWN]
        optional: true
        description: "Trigger type"
      triggerDelay:
        type: number
        coerce: true
        optional: true
        description: "Delay in ms for AFTER_TIMEOUT / MOUSE_ENTER / MOUSE_LEAVE triggers"
      triggerKeyCodes:
        type: "number[]"
        coerce: json
        optional: true
        description: "Key codes for ON_KEY_DOWN trigger"
      triggerDevice:
        type: enum
        values: [KEYBOARD, XBOX_ONE, PS4, SWITCH_PRO]
        optional: true
        description: "Device for ON_KEY_DOWN (default: KEYBOARD)"
      destination:
        type: string
        optional: true
        description: "Target node ID (required for NODE actions). NAVIGATE/SWAP/OVERLAY: must be a top-level frame. CHANGE_TO: must be a variant (component inside a component set)."
      navigation:
        type: enum
        values: [NAVIGATE, SWAP, OVERLAY, SCROLL_TO, CHANGE_TO]
        optional: true
        description: "Navigation type (default: NAVIGATE)"
      transition:
        type: enum
        values: [DISSOLVE, SMART_ANIMATE, MOVE_IN, MOVE_OUT, PUSH, SLIDE_IN, SLIDE_OUT, INSTANT]
        optional: true
        description: "Transition animation (default: DISSOLVE). INSTANT = no animation."
      transitionDirection:
        type: enum
        values: [LEFT, RIGHT, TOP, BOTTOM]
        optional: true
        description: "Direction for MOVE_IN, MOVE_OUT, PUSH, SLIDE_IN, SLIDE_OUT"
      duration:
        type: number
        coerce: true
        optional: true
        description: "Transition duration in seconds (default: 0.3)"
      easing:
        type: enum
        values: [EASE_IN, EASE_OUT, EASE_IN_AND_OUT, LINEAR, GENTLE, QUICK, BOUNCY, SLOW]
        optional: true
        description: "Easing function (default: EASE_OUT)"
      actionType:
        type: enum
        values: [NODE, BACK, CLOSE, URL, SET_VARIABLE_MODE]
        optional: true
        description: "Action type (default: NODE). SET_VARIABLE_MODE switches a variable collection mode."
      url:
        type: string
        optional: true
        description: "URL for URL action type"
      collectionName:
        type: string
        optional: true
        description: "Variable collection name (for SET_VARIABLE_MODE)"
      modeName:
        type: string
        optional: true
        description: "Mode name to switch to (for SET_VARIABLE_MODE)"
      resetScrollPosition:
        type: boolean
        coerce: true
        optional: true
        description: "Reset scroll position on navigate (default: true)"
      actions:
        type: array
        coerce: json
        optional: true
        description: "Multi-action: [{actionType, destination?, navigation?, collectionName?, modeName?, ...}]. Overrides single-action params."
      items:
        type: array
        coerce: json
        optional: true
        description: "Batch: array of {id, trigger, destination?, ...} reaction items"
        items:
          type: object
          properties:
            id: { type: string, required: true, description: "Node ID" }
            trigger: { type: enum, values: [ON_CLICK, ON_HOVER, ON_PRESS, ON_DRAG, AFTER_TIMEOUT, MOUSE_ENTER, MOUSE_LEAVE, ON_KEY_DOWN], required: true, description: "Trigger type" }
            destination: { type: string, optional: true, description: "Target node ID" }
            navigation: { type: enum, values: [NAVIGATE, SWAP, OVERLAY, SCROLL_TO, CHANGE_TO], optional: true }
            transition: { type: enum, values: [DISSOLVE, SMART_ANIMATE, MOVE_IN, MOVE_OUT, PUSH, SLIDE_IN, SLIDE_OUT, INSTANT], optional: true }
            transitionDirection: { type: enum, values: [LEFT, RIGHT, TOP, BOTTOM], optional: true }
            duration: { type: number, coerce: true, optional: true }
            easing: { type: enum, values: [EASE_IN, EASE_OUT, EASE_IN_AND_OUT, LINEAR, GENTLE, QUICK, BOUNCY, SLOW], optional: true }
            actionType: { type: enum, values: [NODE, BACK, CLOSE, URL, SET_VARIABLE_MODE], optional: true }
            triggerDelay: { type: number, coerce: true, optional: true }
            url: { type: string, optional: true }
            collectionName: { type: string, optional: true }
            modeName: { type: string, optional: true }
            resetScrollPosition: { type: boolean, coerce: true, optional: true }
            actions: { type: array, coerce: json, optional: true }
    response:
      type: batch_ok

  set:
    tier: edit
    description: "Replace all reactions on a node (raw reactions array)"
    params:
      id:
        type: string
        required: true
        description: "Node ID"
      reactions:
        type: array
        required: true
        coerce: json
        description: "Full reactions array — [{trigger:{type}, actions:[{type, destinationId, navigation, transition}]}]"
    response:
      type: batch_ok

  remove:
    tier: edit
    description: "Remove a reaction from a node by index"
    params:
      id:
        type: string
        required: true
        description: "Node ID"
      index:
        type: number
        coerce: true
        required: true
        description: "Reaction index (0-based)"
    response:
      type: batch_ok
