endpoint: components
extends: node
domain: design-system
description: "Create and manage reusable components and variant sets."
description_zh: "创建和管理可复用组件和变体集。"

notes: |
  // Components are reusable design elements. Instances stay linked to the component and inherit changes.
  // Workflow: create component (with properties) → add children → create instances via instances.create.
  // ---
  // A component set (variant set) groups related components as variants (e.g. Button/Primary, Button/Secondary).
  // Property types: BOOLEAN (toggle visibility), TEXT (editable text), INSTANCE_SWAP (swap child instance), VARIANT (variant picker).
  // exposeText: when creating from_node, text children become editable TEXT properties on the component.
  // Auto-bind: TEXT properties auto-bind to text children with matching names (case-insensitive).
  // Example: properties:[{propertyName:"Label", type:"TEXT", defaultValue:"Click"}] binds to a child text node named "Label".
  // text.create also accepts componentPropertyName to bind on creation: text(method:"create", items:[{parentId, text:"Click", componentPropertyName:"Label"}]).
  // Property keys include a unique suffix like "Label#1:0". Call components.get(id) to discover exact keys before edit/delete.
  // ComponentItem accepts the same params as FrameItem (layout, fill, stroke, sizing, min/max).
  // A component IS a frame — create it directly with all layout properties, then add children.
  // action: "add" (default) — requires type + defaultValue. "edit" — pass defaultValue to change value, name to rename property. "delete" — just propertyName#suffix.
  // action: "rename_variant" — renames a variant option VALUE (not the property). Pass defaultValue=current option name, name=new option name.
  // For VARIANT properties: "edit" with defaultValue reorders children to set the default variant.

methods:
  list:
    tier: read
    description: List components and component sets
    params:
      query:
        type: string
        optional: true
        description: "Name search query (case-insensitive substring match)"
      setsOnly:
        type: boolean
        coerce: true
        optional: true
        description: "If true, return only COMPONENT_SET nodes"
      fields:
        $ref: fields
      offset:
        $ref: offset
      limit:
        $ref: limit
    response:
      type: paginated
      item:
        type: object
        properties:
          id: { type: string, required: true }
          name: { type: string, required: true }
          type: { type: string, required: true }
          pageId: { type: string, optional: true, description: "Page ID the component lives on" }
          pageName: { type: string, optional: true, description: "Page name the component lives on" }
          variantCount: { type: number, optional: true, description: "Number of variants (COMPONENT_SET only)" }

  get:
    tier: read
    description: Get component or component set detail
    params:
      id:
        type: string
        required: true
        description: "Component or component set ID"
      fields:
        $ref: fields
    response:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        type: { type: string }
        propertyDefinitions: { type: object }

  create:
    tier: create
    description: Create components
    example: 'components(method:"create", type:"component", items:[{name:"Card", layoutMode:"VERTICAL", padding:"16", itemSpacing:"8", fillVariableName:"bg/surface", properties:[{propertyName:"Label", type:"TEXT", defaultValue:"Title"}, {propertyName:"Show Icon", type:"BOOLEAN", defaultValue:true}]}])'
    discriminant: type
    types:
      component:
        description: "Create component with full frame properties (layout, fill, stroke, sizing). A component IS a frame — build directly, no need to create a frame first."
        params:
          $mixin: frame_params
          name: { type: string, required: true, description: Component name }
          properties:
            type: array
            coerce: json
            optional: true
            description: "Component properties to define at creation: [{propertyName, type, defaultValue}]"
            items:
              type: object
              properties:
                propertyName: { type: string, required: true, description: "Property name" }
                type: { type: enum, values: [BOOLEAN, TEXT, INSTANCE_SWAP], required: true, description: "Property type" }
                defaultValue: { type: string_or_boolean, required: true, description: "Default value" }
                preferredValues: { type: array, coerce: json, optional: true, description: "Preferred values for INSTANCE_SWAP" }
      from_node:
        description: "Convert existing nodes to components. Text children auto-exposed as editable properties (exposeText: true)."
        params:
          nodeId: { type: string, required: true, description: Node ID to convert }
          exposeText: { type: boolean, coerce: true, optional: true, description: "Auto-expose text as editable properties (default: true)" }
      variant_set:
        description: Combine components into a variant set. The resulting set is a frame — accepts all frame properties for layout/styling.
        params:
          $mixin: frame_params
          componentIds: { type: "string[]", coerce: json, required: true, description: "Component IDs to combine (min 2)", aliases: [nodeIds] }
          variantPropertyName: { type: string, optional: true, description: "Rename the auto-generated variant property (default: 'Property 1')" }
    response:
      type: batch
      item: { id: { type: string } }

  update:
    tier: edit
    description: "Add, edit, or delete component properties"
    example: 'components(method:"update", items:[{id:"1:23", propertyName:"Label", action:"edit", defaultValue:"Click Me"}])'
    params:
      items:
        type: array
        coerce: json
        required: true
        tsType: "UpdatePropertyItem[]"
        description: 'Array of {id, propertyName, action?, type?, defaultValue?, name?, preferredValues?}'
        items:
          type: object
          properties:
            id: { type: string, required: true, description: "Component or component set ID" }
            propertyName: { type: string, required: true, description: "Property name with #suffix for edit/delete (e.g. \"Label#1:0\"). Call components.get to find exact keys. For add, plain name works." }
            action: { type: enum, values: [add, edit, delete, rename_variant], optional: true, description: '"add" (default): requires type + defaultValue. "edit": pass defaultValue to change default, name to rename property. "delete": just propertyName. "rename_variant": pass defaultValue=current option name, name=new option name.' }
            type: { type: enum, values: [BOOLEAN, TEXT, INSTANCE_SWAP, VARIANT], optional: true, description: "Property type (required for add)" }
            defaultValue: { type: string_or_boolean, optional: true, description: "Default value (add/edit). For rename_variant: the CURRENT option name to rename" }
            name: { type: string, optional: true, description: "New name — for edit: renames the property itself, for rename_variant: the new option value name" }
            preferredValues: { type: array, coerce: json, optional: true, description: "Preferred values for INSTANCE_SWAP" }
      depth: { $ref: depth }
    response:
      type: batch_mixed

  delete:
    tier: edit
    description: Delete components or component sets
    params:
      id:
        type: string
        required: true
        description: "Component or component set ID"
    response:
      type: batch_ok
