endpoint: components
extends: node
domain: design-system
description: "Create and manage reusable components and variant sets."
description_zh: "创建和管理可复用组件和变体集。"

notes: |
  // Components are reusable design elements. Instances stay linked to the component and inherit changes.
  // Workflow: create component (with properties) → add children → create instances via instances.create.
  // ---
  // A component set (variant set) groups related components as variants (e.g. Button/Primary, Button/Secondary).
  // Property types: BOOLEAN (toggle visibility), TEXT (editable text), INSTANCE_SWAP (swap child instance), VARIANT (variant picker).
  // exposeText: when creating from_node, text children become editable TEXT properties on the component.
  // Auto-bind: TEXT properties auto-bind to text children with matching names (case-insensitive).
  // Example: properties:[{propertyName:"Label", type:"TEXT", defaultValue:"Click"}] binds to a child text node named "Label".
  // text.create accepts componentPropertyName to bind on creation — walks up ancestors to find the nearest component.
  //   For nested text (text inside frames inside a component), componentPropertyName resolves via ancestor walk. Alternatively, pass componentId explicitly.
  //   For existing nodes with many text children, prefer components(method:"create", type:"from_node", exposeText:true) — it auto-discovers, creates TEXT properties, and binds all text nodes in one operation.
  // Property keys: read returns clean names ("Label"), write requires the #suffix ("Label#1:0"). Call components.get(id) to discover exact keys before edit/delete.
  // ComponentItem accepts the same params as FrameItem (layout, fill, stroke, sizing, min/max).
  // A component IS a frame — create it directly with all layout properties, then add children.
  // SIZING: Components with text need a width constraint — set width + layoutSizingHorizontal:"FIXED".
  //   Without it, text won't wrap and the component grows unboundedly.
  //   HUG on both axes is only correct for intrinsically-sized elements (buttons, badges, icons).
  // action: "add" (default) — requires type + defaultValue. "edit" — pass defaultValue to change value, name to rename property. "delete" — just propertyName#suffix.
  // action: "rename_variant" — renames a variant option VALUE (not the property). Pass defaultValue=current option name, name=new option name.
  // For VARIANT properties: "edit" with defaultValue reorders children to set the default variant.
  // Adding variants: clone an existing variant into the set with a new name. See guidelines(topic:"component-structure") for workflow.

methods:
  list:
    tier: read
    description: "List local component names (variant sets as single entries)"
    params:
      query:
        type: string
        optional: true
        description: "Name search query (case-insensitive substring match)"
      offset:
        $ref: offset
      limit:
        $ref: limit
    response:
      type: paginated
      item: { type: string, description: "Component name" }

  get:
    tier: read
    description: "Get component detail — property definitions + optional node tree for structural inspection"
    params:
      id:
        type: string
        optional: true
        description: "Component or component set ID"
      names:
        type: string[]
        coerce: json
        optional: true
        description: "Batch lookup by name (case-insensitive). Either id or names is required."
      depth:
        $ref: depth
      verbose:
        type: boolean
        optional: true
        description: "Include all properties (bounding box, constraints, text style details). Default false — returns slim, actionable output."
    response:
      type: object
      properties:
        results:
          type: array
          description: "Component summaries (without depth) or full node trees with properties merged (with depth)"
          items:
            type: object
            properties:
              id: { type: string }
              name: { type: string }
              description: { type: string }
              properties: { type: object, description: "Property definitions — {name: {type, defaultValue, options?}}" }
        _truncated: { type: boolean }
      required: [results]
      example:
        results:
          - id: "1:23"
            name: "Push Button"
            properties:
              Label: { type: TEXT, defaultValue: "Button" }
              Style: { type: VARIANT, defaultValue: "Primary", options: ["Primary", "Secondary"] }
              Size: { type: VARIANT, defaultValue: "Medium", options: ["Small", "Medium", "Large"] }

  create:
    tier: create
    description: Create components
    discriminant: type
    types:
      component:
        description: "Create component with full frame properties (layout, fill, stroke, sizing). A component IS a frame — build directly, no need to create a frame first."
        example: 'components(method:"create", type:"component", items:[{name:"Card", layoutMode:"VERTICAL", padding:"16", itemSpacing:"8", fillVariableName:"bg/surface", children:[{type:"text", text:"Title", componentPropertyName:"Title"}, {type:"text", text:"Description", fontSize:14, componentPropertyName:"Description"}], properties:[{propertyName:"Show Icon", type:"BOOLEAN", defaultValue:true}]}])'
        params:
          $mixin: frame_params
          name: { type: string, required: true, description: Component name }
          description: { type: string, optional: true, description: "Component description (shown in Figma's component panel)" }
          children: { $ref: inlineChildrenComponent }
          properties:
            type: array
            coerce: json
            optional: true
            description: "Component properties to define at creation: [{propertyName, type, defaultValue}]. TEXT properties for inline children with componentPropertyName are created automatically."
            items:
              type: object
              properties:
                propertyName: { type: string, required: true, description: "Property name" }
                type: { type: enum, values: [BOOLEAN, TEXT, INSTANCE_SWAP], required: true, description: "Property type" }
                defaultValue: { type: string_or_boolean, required: true, description: "Default value" }
                preferredValues: { type: array, coerce: json, optional: true, description: "Preferred values for INSTANCE_SWAP" }
      from_node:
        description: "Convert existing nodes to components. Text children auto-exposed as editable properties (exposeText: true)."
        params:
          nodeId: { type: string, required: true, description: Node ID to convert }
          name: { type: string, optional: true, description: "Rename the component (default: keeps the node's current name)" }
          exposeText: { type: boolean, coerce: true, optional: true, description: "Auto-expose text as editable properties (default: true)" }
      variant_set:
        description: Combine components into a variant set. The resulting set is a frame — accepts all frame properties for layout/styling.
        example: 'components(method:"create", type:"variant_set", items:[{name:"Button", children:[{type:"component", name:"Style=Primary", children:[{type:"text", text:"Button", componentPropertyName:"Label"}]}, {type:"component", name:"Style=Secondary", children:[{type:"text", text:"Button", componentPropertyName:"Label"}]}]}])'
        params:
          $mixin: frame_params
          componentIds: { type: "string[]", coerce: json, optional: true, description: "Existing component IDs to combine (min 2). Alternative to children.", aliases: [nodeIds] }
          variantPropertyName: { type: string, optional: true, description: "Rename the auto-generated variant property (default: 'Property 1')" }
          children: { $ref: inlineVariants }
    response:
      type: batch
      item: { id: { type: string } }

  commit:
    tier: edit
    description: "Commit a staged component — unwraps from [STAGED] container into the original target location."
    example: 'components(method:"commit", id:"1:234")'
    params:
      id: { type: string, required: true, description: "Staged node ID to commit" }
    response:
      type: batch
      item: { id: { type: string } }

  update:
    tier: edit
    description: "Add, edit, or delete component properties"
    example: 'components(method:"update", items:[{id:"1:23", propertyName:"Label", action:"edit", defaultValue:"Click Me"}])'
    params:
      items:
        type: array
        coerce: json
        required: true
        tsType: "UpdatePropertyItem[]"
        description: 'Array of {id, propertyName, action?, type?, defaultValue?, name?, preferredValues?}'
        items:
          type: object
          properties:
            id: { type: string, required: true, description: "Component or component set ID" }
            propertyName: { type: string, required: true, description: "Property name with #suffix for edit/delete (e.g. \"Label#1:0\"). Call components.get to find exact keys. For add, plain name works." }
            action: { type: enum, values: [add, edit, delete, rename_variant], optional: true, description: '"add" (default): requires type + defaultValue. "edit": pass defaultValue to change default, name to rename property. "delete": just propertyName. "rename_variant": pass defaultValue=current option name, name=new option name.' }
            type: { type: enum, values: [BOOLEAN, TEXT, INSTANCE_SWAP, VARIANT], optional: true, description: "Property type (required for add)" }
            defaultValue: { type: string_or_boolean, optional: true, description: "Default value (add/edit). For rename_variant: the CURRENT option name to rename" }
            name: { type: string, optional: true, description: "New name — for edit: renames the property itself, for rename_variant: the new option value name" }
            preferredValues: { type: array, coerce: json, optional: true, description: "Preferred values for INSTANCE_SWAP" }
      depth: { $ref: depth }
    response:
      type: batch_mixed

  delete:
    tier: edit
    description: Delete components or component sets
    params:
      id:
        type: string
        required: true
        description: "Component or component set ID"
    response:
      type: batch_ok
