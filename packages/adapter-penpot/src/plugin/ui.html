<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vibma — Penpot</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
        margin: 0;
        padding: 0;
        color: #e8e8e8;
        background-color: #171717;
        font-size: 13px;
        -webkit-font-smoothing: antialiased;
      }

      .container {
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 100vh;
      }

      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-bottom: 12px;
        border-bottom: 1px solid #272727;
      }

      .header-title { font-size: 14px; font-weight: 600; color: #f5f5f5; letter-spacing: -0.02em; }
      .version-chip { font-size: 11px; color: #b0b0b0; font-variant-numeric: tabular-nums; }

      .connection-banner {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 10px;
        border: 1px solid #3a3a3a;
        border-radius: 999px;
        background-color: #222222;
      }

      .banner-primary {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        white-space: nowrap;
        color: #e6e6e6;
        font-size: 11px;
        font-weight: 600;
      }

      .banner-icon {
        width: 14px;
        height: 14px;
        border-radius: 999px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid #5a5a5a;
        color: #b0b0b0;
        font-size: 12px;
        line-height: 1;
        flex-shrink: 0;
      }

      .connection-banner.connected .banner-icon { border-color: #2f8c5c; color: #5fd69a; }
      .connection-banner.error { border-color: #6f2e2e; background-color: #2a1717; }
      .connection-banner.error .banner-icon { border-color: #a94040; color: #ff7a7a; }

      .banner-divider { width: 1px; height: 18px; background-color: #3b3b3b; flex-shrink: 0; }

      .banner-secondary {
        min-width: 0;
        flex: 1;
        color: #b8b8b8;
        font-size: 11px;
        white-space: normal;
        overflow: hidden;
        text-overflow: ellipsis;
        line-height: 1.25;
      }

      .connection-banner.connected .banner-secondary { color: #bfe7d1; }

      .form-row { display: grid; grid-template-columns: 76px 1fr; gap: 8px; align-items: end; }
      .form-group { display: flex; flex-direction: column; gap: 4px; }

      label {
        font-size: 10.5px;
        font-weight: 500;
        color: #b8b8b8;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      input, select {
        background-color: #212121;
        border: 1px solid #2e2e2e;
        border-radius: 6px;
        padding: 7px 8px;
        font-size: 13px;
        color: #e8e8e8;
        outline: none;
        width: 100%;
        transition: border-color 0.15s;
        font-family: inherit;
      }

      input:focus, select:focus { border-color: #7c3aed; }
      input:disabled, select:disabled { opacity: 0.5; cursor: not-allowed; }

      button {
        background-color: #7c3aed;
        border: none;
        color: #fff;
        padding: 8px 14px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        font-family: inherit;
        width: 100%;
        transition: background-color 0.15s ease;
        letter-spacing: -0.01em;
      }

      button:hover:not(:disabled) { background-color: #6d28d9; }
      button.secondary { background-color: #242424; color: #d0d0d0; border: 1px solid #333; }
      button.secondary:hover:not(:disabled) { background-color: #2c2c2c; }
      button:disabled { opacity: 0.35; cursor: not-allowed; }

      .footer-row { font-size: 11.5px; color: #b0b0b0; text-align: center; margin-top: auto; padding-top: 8px; }
      .link { color: #a78bfa; text-decoration: none; cursor: pointer; }
      .link:hover { text-decoration: underline; }

      .info-box {
        font-size: 11.5px;
        color: #9cc9f4;
        line-height: 1.45;
        padding: 10px 12px;
        background-color: #0f1f30;
        border-radius: 10px;
        border: 1px solid #2d5f8a;
      }
    </style>
  </head>

  <body>
    <div class="container">

      <!-- Header -->
      <div class="header">
        <span class="header-title">Vibma</span>
        <span class="version-chip" id="version-badge"></span>
      </div>

      <!-- Connection banner -->
      <div id="connection-banner" class="connection-banner disconnected">
        <div class="banner-primary">
          <span id="banner-icon" class="banner-icon">○</span>
          <span id="banner-status-label">Disconnected</span>
        </div>
        <div class="banner-divider"></div>
        <div id="connection-info" class="banner-secondary"></div>
      </div>

      <!-- Port + Channel -->
      <div class="form-row">
        <div class="form-group">
          <label>Port</label>
          <select id="port">
            <option value="3055" selected>3055</option>
            <option value="3056">3056</option>
            <option value="3057">3057</option>
            <option value="3058">3058</option>
          </select>
        </div>
        <div class="form-group">
          <label>Channel</label>
          <input
            type="text"
            id="channel-name"
            placeholder="vibma"
            value="vibma"
            maxlength="32"
            pattern="[a-zA-Z0-9_\-]+"
          />
        </div>
      </div>

      <!-- Connect button -->
      <button id="btn-connect">Connect</button>

      <!-- Info -->
      <div class="info-box">
        <strong>Note:</strong> Vibma grants the connected AI agent full read &amp; write access to this Penpot file.
        It can create, modify, and delete layers in your design. Use with care.
      </div>

      <!-- Footer -->
      <div class="footer-row">
        Having issues? <a class="link" id="btn-reset">Reset tunnel</a>
      </div>

    </div>

    <script>
      // Keep in sync with package.json version
      const VIBMA_VERSION = "0.1.0";

      // ─── State ──────────────────────────────────────────────────
      const state = {
        connected: false,
        socket: null,
        serverPort: 3055,
        pendingRequests: new Map(),
        channel: null,
        lastError: null,
        mcpPeer: null,
      };

      document.getElementById("version-badge").textContent = `v${VIBMA_VERSION}`;

      const portInput = document.getElementById("port");
      const channelInput = document.getElementById("channel-name");
      const connectButton = document.getElementById("btn-connect");
      const connectionBanner = document.getElementById("connection-banner");
      const bannerIcon = document.getElementById("banner-icon");
      const bannerStatusLabel = document.getElementById("banner-status-label");
      const connectionInfo = document.getElementById("connection-info");

      // ─── Connection status ────────────────────────────────────
      function updateConnectionStatus(isConnected, message) {
        state.connected = isConnected;
        connectionBanner.className = `connection-banner ${isConnected ? "connected" : "disconnected"}`;
        bannerIcon.textContent = isConnected ? "✓" : "○";
        bannerStatusLabel.textContent = isConnected ? "Connected" : (message || "Disconnected");
        connectionInfo.textContent = isConnected
          ? `Channel: ${state.channel || "—"}`
          : (message || "Not connected to Vibma relay");
        connectButton.textContent = isConnected ? "Disconnect" : "Connect";
        connectButton.className = isConnected ? "secondary" : "";
        portInput.disabled = isConnected;
        channelInput.disabled = isConnected;
      }

      // ─── WebSocket relay ──────────────────────────────────────
      // Plain `new WebSocket(url)` — same relay protocol as adapter-figma.
      // The plugin UI runs inside a Penpot iframe (served from the `host` dev server),
      // so it can reach localhost directly without Figma's sandboxed network restrictions.

      function connectToServer(port) {
        if (state.connected && state.socket) return;
        state.serverPort = port;
        const wsUrl = `ws://localhost:${port}`;
        state.socket = new WebSocket(wsUrl);

        state.socket.onopen = () => {
          const custom = channelInput.value.trim().replace(/[^a-zA-Z0-9_\-]/g, "");
          const channelName = custom || generateChannelName();
          state.channel = channelName;
          state.socket.send(JSON.stringify({
            type: "join",
            channel: channelName,
            role: "plugin",
            version: VIBMA_VERSION,
          }));
        };

        state.socket.onmessage = (event) => {
          try {
            const data = JSON.parse(event.data);
            if (data.type === "system" && data.message && data.message.result) {
              updateConnectionStatus(true);
            } else if (data.type === "system" && data.code === "PEER_JOINED" && data.peer?.role === "mcp") {
              state.mcpPeer = data.peer;
              updateConnectionStatus(true);
            } else if (data.type === "error") {
              state.lastError = data.message;
              updateConnectionStatus(false, `Error: ${data.message}`);
              if (state.socket) { state.socket.close(); state.socket = null; }
            }
            handleSocketMessage(data);
          } catch (e) {
            console.error("Error parsing relay message:", e);
          }
        };

        state.socket.onclose = () => {
          state.connected = false;
          state.socket = null;
          state.mcpPeer = null;
          if (!state.lastError) updateConnectionStatus(false, "Disconnected from server");
          state.lastError = null;
        };

        state.socket.onerror = () => {
          state.lastError = `Relay not reachable on port ${port}`;
          updateConnectionStatus(false, state.lastError);
          state.connected = false;
          state.socket = null;
        };
      }

      function disconnectFromServer() {
        if (state.socket) {
          state.socket.close();
          state.socket = null;
          state.connected = false;
          updateConnectionStatus(false, "Disconnected");
        }
      }

      // ─── Relay message handling ───────────────────────────────
      function handleSocketMessage(payload) {
        const data = payload.message;
        if (!data) return;

        if (data.id && state.pendingRequests.has(data.id)) {
          const { resolve, reject } = state.pendingRequests.get(data.id);
          state.pendingRequests.delete(data.id);
          if (data.error) reject(new Error(data.error));
          else resolve(data.result);
          return;
        }

        if (data.command) {
          // Forward command to plugin code via Penpot's postMessage channel
          window.parent.postMessage({ type: "execute-command", id: data.id, command: data.command, params: data.params }, "*");
        }
      }

      function sendSuccessResponse(id, result) {
        if (!state.connected || !state.socket) return;
        state.socket.send(JSON.stringify({ id, type: "message", channel: state.channel, message: { id, result } }));
      }

      function sendErrorResponse(id, errorMessage) {
        if (!state.connected || !state.socket) return;
        state.socket.send(JSON.stringify({ id, type: "message", channel: state.channel, message: { id, error: errorMessage, result: {} } }));
      }

      function generateId() {
        return Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
      }

      function generateChannelName() {
        const chars = "abcdefghijklmnopqrstuvwxyz0123456789";
        let r = "";
        for (let i = 0; i < 8; i++) r += chars[Math.floor(Math.random() * chars.length)];
        return r;
      }

      // ─── Event listeners ─────────────────────────────────────
      connectButton.addEventListener("click", () => {
        if (state.connected) disconnectFromServer();
        else connectToServer(parseInt(portInput.value, 10) || 3055);
      });

      document.getElementById("btn-reset").addEventListener("click", async () => {
        const port = parseInt(portInput.value, 10) || 3055;
        const channel = channelInput.value.trim() || "vibma";
        if (state.socket) { state.socket.onclose = null; state.socket.close(); state.socket = null; }
        state.connected = false;
        state.mcpPeer = null;
        state.lastError = null;
        state.pendingRequests.clear();
        updateConnectionStatus(false, "Resetting tunnel...");
        try {
          await fetch(`http://localhost:${port}/channels/${encodeURIComponent(channel)}`, { method: "DELETE" });
        } catch (e) {
          console.warn("Could not reach relay for reset:", e);
        }
        setTimeout(() => connectToServer(port), 500);
      });

      // ─── Messages from plugin code ────────────────────────────
      // Penpot plugin iframe communication uses window.onmessage the same way as Figma.
      window.onmessage = (event) => {
        const message = event.data;
        if (!message || !message.type) return;
        switch (message.type) {
          case "command-result":
            sendSuccessResponse(message.id, message.result);
            break;
          case "command-error":
            sendErrorResponse(message.id, message.error);
            break;
        }
      };
    </script>
  </body>
</html>
